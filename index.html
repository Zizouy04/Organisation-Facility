<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ATEC - Gestion Maintenance BTP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f1f5f9;min-height:100vh}
header{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:white;padding:16px 24px;display:flex;align-items:center;gap:16px}
.logo{background:rgba(255,255,255,0.15);border-radius:10px;padding:8px 14px;font-weight:900;font-size:22px;letter-spacing:2px}
nav{background:white;border-bottom:1px solid #e5e7eb;display:flex;gap:4px;padding:0 16px;overflow-x:auto}
nav button{background:none;border:none;padding:14px 16px;font-weight:400;color:#6b7280;border-bottom:3px solid transparent;cursor:pointer;font-size:14px;white-space:nowrap;transition:.2s}
nav button.active{font-weight:700;color:#2563eb;border-bottom:3px solid #2563eb}
.container{padding:20px;max-width:1100px;margin:0 auto}
.tab{display:none}.tab.active{display:block}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.kpi{background:white;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid #ccc}
.kpi .icon{font-size:28px}.kpi .val{font-size:24px;font-weight:800}.kpi .lbl{font-size:13px;color:#6b7280}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:white;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.panel{background:white;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:20px}
.panel h3{margin:0 0 16px;color:#1e3a5f}
table{width:100%;border-collapse:collapse;font-size:14px}
thead tr{background:#f8fafc}
th{padding:10px 12px;text-align:left;color:#374151;font-weight:600;border-bottom:2px solid #e5e7eb;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #f1f5f9}
.badge{border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-red{background:#fee2e2;color:#dc2626}
.badge-green{background:#dcfce7;color:#16a34a}
.badge-yellow{background:#fef3c7;color:#d97706}
.badge-cyan{background:#cffafe;color:#0891b2}
.row-actions{display:flex;gap:4px}
.btn{border:none;border-radius:6px;padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer;color:white}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-blue{background:#2563eb}.btn-gray{background:#6b7280}.btn-red{background:#dc2626}.btn-cyan{background:#0891b2}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.section-header h2{margin:0;color:#1e3a5f}
/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:white;border-radius:12px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-header h3{margin:0;font-size:18px;font-weight:700;color:#1e3a5f}
.modal-header .close{background:none;border:none;font-size:20px;cursor:pointer;color:#6b7280}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px}
.field input,.field select{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:14px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
/* Charts */
svg text{font-family:'Segoe UI',sans-serif}
.chart-wrap{overflow-x:auto}
/* Ishikawa btns */
.ishi-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.ishi-btn{padding:6px 14px;border-radius:20px;border:2px solid #e5e7eb;background:white;color:#374151;cursor:pointer;font-weight:600;font-size:13px;transition:.2s}
.ishi-btn.active{border-color:#2563eb;background:#dbeafe;color:#1d4ed8}
.empty{color:#9ca3af;padding:40px;text-align:center}
.tag{background:#f1f5f9;border-radius:4px;padding:2px 6px;font-size:12px}
</style>
</head>
<body>

<header>
  <div class="logo">ATEC</div>
  <div>
    <div style="font-weight:700;font-size:16px">Gestion de Maintenance BTP</div>
    <div style="font-size:12px;opacity:.8">Suivi des interventions & analyses</div>
  </div>
</header>

<nav>
  <button class="active" onclick="showTab('dashboard',this)">📊 Dashboard</button>
  <button onclick="showTab('clients',this)">👷 Clients</button>
  <button onclick="showTab('machines',this)">🚧 Machines</button>
  <button onclick="showTab('interventions',this)">🔧 Interventions</button>
  <button onclick="showTab('analyses',this)">📈 Analyses</button>
</nav>

<div class="container">
  <div id="tab-dashboard" class="tab active"></div>
  <div id="tab-clients" class="tab"></div>
  <div id="tab-machines" class="tab"></div>
  <div id="tab-interventions" class="tab"></div>
  <div id="tab-analyses" class="tab"></div>
</div>

<!-- MODALS -->
<div class="overlay" id="modal-client">
  <div class="modal">
    <div class="modal-header"><h3 id="client-modal-title">Client</h3><button class="close" onclick="closeModal('modal-client')">✕</button></div>
    <div class="field"><label>Nom de l'entreprise *</label><input id="c-nom" placeholder="ex: BTP Sud"/></div>
    <div class="field"><label>Contact</label><input id="c-contact" placeholder="Nom du responsable"/></div>
    <div class="field"><label>Téléphone</label><input id="c-tel" placeholder="06 xx xx xx xx"/></div>
    <div class="field"><label>Email</label><input id="c-email" placeholder="contact@entreprise.fr"/></div>
    <div class="modal-footer"><button class="btn btn-gray" onclick="closeModal('modal-client')">Annuler</button><button class="btn btn-blue" onclick="saveClient()">Enregistrer</button></div>
  </div>
</div>

<div class="overlay" id="modal-machine">
  <div class="modal">
    <div class="modal-header"><h3 id="machine-modal-title">Machine</h3><button class="close" onclick="closeModal('modal-machine')">✕</button></div>
    <div class="field"><label>Nom / Désignation *</label><input id="m-nom" placeholder="ex: CAT 320D"/></div>
    <div class="field"><label>Type *</label><select id="m-type"></select></div>
    <div class="field"><label>Marque</label><input id="m-marque" placeholder="ex: Caterpillar"/></div>
    <div class="field"><label>Numéro de série</label><input id="m-serie"/></div>
    <div class="field"><label>Année</label><input id="m-annee" type="number"/></div>
    <div class="field"><label>Client associé</label><select id="m-client"></select></div>
    <div class="modal-footer"><button class="btn btn-gray" onclick="closeModal('modal-machine')">Annuler</button><button class="btn btn-blue" onclick="saveMachine()">Enregistrer</button></div>
  </div>
</div>

<div class="overlay" id="modal-interv">
  <div class="modal">
    <div class="modal-header"><h3 id="interv-modal-title">Intervention</h3><button class="close" onclick="closeModal('modal-interv')">✕</button></div>
    <div class="field"><label>Machine *</label><select id="i-machine"></select></div>
    <div class="field"><label>Date *</label><input id="i-date" type="date"/></div>
    <div class="field"><label>Type</label><select id="i-type"><option>Correctif</option><option>Préventif</option><option>Amélioratif</option></select></div>
    <div class="field"><label>Description</label><input id="i-desc" placeholder="Décrivez l'intervention"/></div>
    <div class="field"><label>Technicien</label><input id="i-tech"/></div>
    <div class="field"><label>Durée (heures)</label><input id="i-duree" type="number"/></div>
    <div class="field"><label>Coût (€)</label><input id="i-cout" type="number"/></div>
    <div class="field"><label>Type de panne</label><input id="i-panne" placeholder="ex: Hydraulique, Moteur..."/></div>
    <div class="modal-footer"><button class="btn btn-gray" onclick="closeModal('modal-interv')">Annuler</button><button class="btn btn-blue" onclick="saveInterv()">Enregistrer</button></div>
  </div>
</div>

<script>
const MACHINE_TYPES=["Pelle hydraulique","Bulldozer","Chargeuse","Compacteur","Grue mobile","Niveleuse","Tombereau","Finisseur","Foreuse","Chariot télescopique","Perceuse","Perceuse à percussion","Marteau piqueur","Marteau perforateur","Disqueuse","Meuleuse","Tronçonneuse","Scie circulaire","Visseuse","Ponceuse","Compresseur","Groupe électrogène","Pompe à eau","Vibreur à béton","Pistolet à clouer","Chalumeau","Nettoyeur haute pression","Autre"];

let clients=[
  {id:1,nom:"BTP Sud",contact:"Jean Dupont",tel:"06 12 34 56 78",email:"contact@btpsud.fr"},
  {id:2,nom:"Constructions Martin",contact:"Paul Martin",tel:"06 98 76 54 32",email:"p.martin@constructions.fr"}
];
let machines=[
  {id:1,nom:"CAT 320",type:"Pelle hydraulique",marque:"Caterpillar",serie:"CAT-001",annee:2018,clientId:1},
  {id:2,nom:"D6T",type:"Bulldozer",marque:"Caterpillar",serie:"CAT-002",annee:2019,clientId:1},
  {id:3,nom:"JD 644K",type:"Chargeuse",marque:"John Deere",serie:"JD-001",annee:2020,clientId:2}
];
let interventions=[
  {id:1,machineId:1,date:"2024-01-10",type:"Correctif",description:"Fuite hydraulique",technicien:"Dupont",duree:8,cout:1200,panne:"Hydraulique"},
  {id:2,machineId:1,date:"2024-02-15",type:"Préventif",description:"Vidange moteur",technicien:"Martin",duree:3,cout:350,panne:"Moteur"},
  {id:3,machineId:2,date:"2024-01-20",type:"Correctif",description:"Chenille cassée",technicien:"Dupont",duree:12,cout:2500,panne:"Transmission"},
  {id:4,machineId:2,date:"2024-03-05",type:"Correctif",description:"Moteur surchauffe",technicien:"Leroy",duree:6,cout:800,panne:"Moteur"},
  {id:5,machineId:3,date:"2024-02-01",type:"Préventif",description:"Graissage général",technicien:"Martin",duree:2,cout:150,panne:"Entretien"},
  {id:6,machineId:1,date:"2024-03-20",type:"Correctif",description:"Bras cassé",technicien:"Leroy",duree:20,cout:4500,panne:"Structure"}
];

let editClientId=null, editMachineId=null, editIntervId=null;

// NAV
function showTab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  render(name);
}

function render(name){
  if(name==='dashboard') renderDashboard();
  if(name==='clients') renderClients();
  if(name==='machines') renderMachines();
  if(name==='interventions') renderInterventions();
  if(name==='analyses') renderAnalyses();
}

// UTILS
function getMachine(id){return machines.find(m=>m.id===id);}
function getClient(id){return clients.find(c=>c.id===id);}
function kpiData(m){
  const ints=interventions.filter(i=>i.machineId===m.id);
  const corr=ints.filter(i=>i.type==="Correctif");
  const cout=ints.reduce((s,i)=>s+Number(i.cout),0);
  const duree=ints.reduce((s,i)=>s+Number(i.duree),0);
  const mtbf=corr.length>1?Math.round(365/corr.length*10)/10:"N/A";
  const mttr=corr.length?Math.round(corr.reduce((s,i)=>s+Number(i.duree),0)/corr.length*10)/10:0;
  return {ints:ints.length,corr:corr.length,cout,duree,mtbf,mttr};
}
function typeBadge(t){
  if(t==="Correctif") return `<span class="badge badge-red">${t}</span>`;
  if(t==="Préventif") return `<span class="badge badge-green">${t}</span>`;
  return `<span class="badge badge-yellow">${t}</span>`;
}

// DASHBOARD
function renderDashboard(){
  const totalCout=interventions.reduce((s,i)=>s+Number(i.cout),0);
  const totalDuree=interventions.reduce((s,i)=>s+Number(i.duree),0);
  const kpiCards=[
    {icon:"👷",val:clients.length,lbl:"Clients",color:"#0891b2"},
    {icon:"🚧",val:machines.length,lbl:"Machines",color:"#2563eb"},
    {icon:"🔧",val:interventions.length,lbl:"Interventions",color:"#16a34a"},
    {icon:"💶",val:totalCout.toLocaleString()+" €",lbl:"Coût total",color:"#d97706"},
    {icon:"⏱️",val:totalDuree+" h",lbl:"Heures réparation",color:"#9333ea"},
  ];
  const rows=machines.map(m=>{
    const k=kpiData(m);
    const cl=getClient(m.clientId);
    return `<tr>
      <td style="font-weight:600;color:#1e3a5f">${m.nom}</td>
      <td style="color:#6b7280">${m.type}</td>
      <td style="color:#0891b2;font-weight:600">${cl?cl.nom:"-"}</td>
      <td><span class="badge badge-blue">${k.ints}</span></td>
      <td><span class="badge badge-red">${k.corr}</span></td>
      <td style="font-weight:600">${k.mtbf}${k.mtbf!=="N/A"?" j":""}</td>
      <td>${k.mttr} h</td>
      <td style="color:#d97706;font-weight:600">${k.cout.toLocaleString()} €</td>
      <td>${k.duree} h</td>
    </tr>`;
  }).join("");
  document.getElementById('tab-dashboard').innerHTML=`
    <div class="grid4">${kpiCards.map(c=>`<div class="kpi" style="border-left-color:${c.color}"><div class="icon">${c.icon}</div><div class="val" style="color:${c.color}">${c.val}</div><div class="lbl">${c.lbl}</div></div>`).join("")}</div>
    <div class="panel"><h3>KPIs par machine</h3><div style="overflow-x:auto"><table>
      <thead><tr>${["Machine","Type","Client","Interventions","Correctifs","MTBF (j)","MTTR (h)","Coût total","Durée tot."].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>`;
}

// CLIENTS
function renderClients(){
  const cards=clients.map(c=>{
    const nb=machines.filter(m=>Number(m.clientId)===c.id).length;
    return `<div class="card" style="border-left:4px solid #0891b2">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span class="badge badge-cyan">${nb} machine${nb>1?"s":""}</span>
        <div class="row-actions">
          <button class="btn btn-gray btn-sm" onclick="openEditClient(${c.id})">✏️</button>
          <button class="btn btn-red btn-sm" onclick="delClient(${c.id})">🗑️</button>
        </div>
      </div>
      <div style="font-weight:800;font-size:18px;color:#1e3a5f;margin-bottom:6px">${c.nom}</div>
      <div style="font-size:13px;color:#374151;margin-bottom:2px">👤 ${c.contact||"—"}</div>
      <div style="font-size:13px;color:#6b7280;margin-bottom:2px">📞 ${c.tel||"—"}</div>
      <div style="font-size:13px;color:#6b7280">✉️ ${c.email||"—"}</div>
    </div>`;
  }).join("")||`<div class="empty">Aucun client enregistré.</div>`;
  document.getElementById('tab-clients').innerHTML=`
    <div class="section-header"><h2>👷 Clients</h2><button class="btn btn-cyan" onclick="openNewClient()">+ Ajouter un client</button></div>
    <div class="card-grid">${cards}</div>`;
}

// MACHINES
function renderMachines(){
  const cards=machines.map(m=>{
    const nb=interventions.filter(i=>i.machineId===m.id).length;
    const cl=getClient(Number(m.clientId));
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span class="badge badge-blue">${m.type}</span>
        <div class="row-actions">
          <button class="btn btn-gray btn-sm" onclick="openEditMachine(${m.id})">✏️</button>
          <button class="btn btn-red btn-sm" onclick="delMachine(${m.id})">🗑️</button>
        </div>
      </div>
      <div style="font-weight:800;font-size:18px;color:#1e3a5f;margin-bottom:4px">${m.nom}</div>
      <div style="font-size:13px;color:#6b7280">${m.marque} · ${m.annee}</div>
      <div style="font-size:12px;color:#9ca3af;margin-bottom:4px">N°${m.serie}</div>
      ${cl?`<div style="font-size:12px;color:#0891b2;font-weight:600;margin-bottom:4px">👷 ${cl.nom}</div>`:""}
      <div style="font-size:13px;color:#374151">${nb} intervention${nb>1?"s":""}</div>
    </div>`;
  }).join("")||`<div class="empty">Aucune machine enregistrée.</div>`;
  document.getElementById('tab-machines').innerHTML=`
    <div class="section-header"><h2>🚧 Parc machines</h2><button class="btn btn-blue" onclick="openNewMachine()">+ Ajouter une machine</button></div>
    <div class="card-grid">${cards}</div>`;
}

// INTERVENTIONS
function renderInterventions(){
  const sorted=[...interventions].sort((a,b)=>b.date.localeCompare(a.date));
  const rows=sorted.map(i=>{
    const m=getMachine(i.machineId);
    return `<tr>
      <td style="color:#6b7280">${i.date}</td>
      <td style="font-weight:600;color:#1e3a5f">${m?m.nom:"?"}</td>
      <td>${typeBadge(i.type)}</td>
      <td style="max-width:160px">${i.description}</td>
      <td>${i.technicien}</td>
      <td>${i.duree} h</td>
      <td style="color:#d97706;font-weight:600">${Number(i.cout).toLocaleString()} €</td>
      <td><span class="tag">${i.panne}</span></td>
      <td><div class="row-actions">
        <button class="btn btn-gray btn-sm" onclick="openEditInterv(${i.id})">✏️</button>
        <button class="btn btn-red btn-sm" onclick="delInterv(${i.id})">🗑️</button>
      </div></td>
    </tr>`;
  }).join("")||`<tr><td colspan="9" class="empty">Aucune intervention.</td></tr>`;
  document.getElementById('tab-interventions').innerHTML=`
    <div class="section-header"><h2>🔧 Interventions</h2><button class="btn btn-blue" onclick="openNewInterv()">+ Nouvelle intervention</button></div>
    <div class="panel" style="padding:0;overflow-x:auto"><table>
      <thead><tr>${["Date","Machine","Type","Description","Technicien","Durée","Coût","Panne","Actions"].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

// ANALYSES
function renderAnalyses(){
  document.getElementById('tab-analyses').innerHTML=`
    <h2 style="margin:0 0 20px;color:#1e3a5f">📈 Analyses</h2>
    <div class="panel"><h3>Pareto – Fréquence des pannes</h3><div class="chart-wrap" id="pareto-chart"></div></div>
    <div class="panel"><h3>Ishikawa – Causes racines</h3>
      <p style="font-size:13px;color:#6b7280;margin:0 0 12px">Sélectionnez une machine :</p>
      <div class="ishi-btns">${machines.map(m=>`<button class="ishi-btn" onclick="showIshikawa(${m.id},this)">${m.nom}</button>`).join("")}</div>
      <div id="ishi-chart"><div class="empty">Sélectionnez une machine pour afficher le diagramme</div></div>
    </div>
    <div class="panel"><h3>Coûts & durées par machine</h3><div style="display:flex;flex-wrap:wrap;gap:12px">${renderCoutCards()}</div></div>`;
  drawPareto();
}

function renderCoutCards(){
  const colors=["#2563eb","#dc2626","#16a34a","#d97706","#9333ea","#0891b2"];
  return machines.map((m,i)=>{
    const k=kpiData(m);
    return `<div style="flex:1 1 200px;background:#f8fafc;border-radius:10px;padding:16px;border-left:4px solid ${colors[i%colors.length]}">
      <div style="font-weight:700;margin-bottom:8px;color:#1e3a5f">${m.nom}</div>
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="color:#6b7280">Coût</span><span style="font-weight:700;color:${colors[i%colors.length]}">${k.cout.toLocaleString()} €</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="color:#6b7280">Durée</span><span style="font-weight:700">${k.duree} h</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:#6b7280">MTBF</span><span style="font-weight:700">${k.mtbf}${k.mtbf!=="N/A"?" j":""}</span></div>
    </div>`;
  }).join("");
}

function drawPareto(){
  const panneCount={};
  interventions.forEach(i=>{panneCount[i.panne]=(panneCount[i.panne]||0)+1;});
  const sorted=Object.entries(panneCount).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length){document.getElementById('pareto-chart').innerHTML='<div class="empty">Aucune donnée</div>';return;}
  const total=sorted.reduce((s,[,v])=>s+v,0);
  let cumul=0;
  const data=sorted.map(([k,v])=>{cumul+=v;return{k,v,pct:Math.round(cumul/total*100)};});
  const maxV=Math.max(...data.map(d=>d.v));
  const W=520,H=220,PL=40,PR=40,PT=20,PB=50;
  const bw=(W-PL-PR)/data.length-6;
  let bars="",labels="",vals="",pts=[];
  data.forEach((d,i)=>{
    const x=PL+i*(bw+6)+3,bh=(H-PT-PB)*(d.v/maxV),by=PT+(H-PT-PB)-bh;
    bars+=`<rect x="${x}" y="${by}" width="${bw}" height="${bh}" fill="#2563eb" rx="2"/>`;
    labels+=`<text x="${x+bw/2}" y="${H-PB+14}" font-size="9" fill="#374151" text-anchor="middle">${d.k}</text>`;
    vals+=`<text x="${x+bw/2}" y="${by-4}" font-size="9" fill="#1d4ed8" text-anchor="middle">${d.v}</text>`;
    const cy=PT+(H-PT-PB)*(1-d.pct/100);
    pts.push(`${x+bw/2},${cy}`);
  });
  const grid=[0,25,50,75,100].map(p=>{const y=PT+(H-PT-PB)*(1-p/100);return`<line x1="${PL}" x2="${W-PR}" y1="${y}" y2="${y}" stroke="#e5e7eb" stroke-width="1"/><text x="${PL-4}" y="${y+4}" font-size="10" fill="#6b7280" text-anchor="end">${p}%</text>`;}).join("");
  const line=data.length>1?`<polyline points="${pts.join(" ")}" fill="none" stroke="#dc2626" stroke-width="2"/>${pts.map(p=>`<circle cx="${p.split(",")[0]}" cy="${p.split(",")[1]}" r="3" fill="#dc2626"/>`).join("")}`:"";
  document.getElementById('pareto-chart').innerHTML=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px">${grid}${bars}${labels}${vals}${line}<text x="${W/2}" y="${H-2}" font-size="11" fill="#374151" text-anchor="middle" font-weight="bold">Diagramme de Pareto – Types de pannes</text></svg>`;
}

function showIshikawa(mId,btn){
  document.querySelectorAll('.ishi-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const m=getMachine(mId);
  const ints=interventions.filter(i=>i.machineId===mId&&i.type==="Correctif");
  const cats={Matière:[],Méthode:[],Machine:[],["Main d'œuvre"]:[],Milieu:[],Mesure:[]};
  ints.forEach(i=>{
    const cat=["Hydraulique","Moteur","Transmission","Structure"].includes(i.panne)?"Machine":i.panne==="Entretien"?"Méthode":"Main d'œuvre";
    cats[cat].push(i.description.slice(0,18));
  });
  const W=580,H=280,spines=[["Matière","#2563eb"],["Méthode","#16a34a"],["Machine","#dc2626"],["Main d'œuvre","#d97706"],["Milieu","#9333ea"],["Mesure","#0891b2"]];
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px">`;
  svg+=`<line x1="60" y1="${H/2}" x2="${W-80}" y2="${H/2}" stroke="#374151" stroke-width="3"/>`;
  svg+=`<polygon points="${W-80},${H/2-12} ${W-20},${H/2} ${W-80},${H/2+12}" fill="#374151"/>`;
  svg+=`<rect x="${W-20}" y="${H/2-18}" width="70" height="36" fill="#dc2626" rx="4"/>`;
  svg+=`<text x="${W-20+35}" y="${H/2+5}" font-size="11" fill="white" text-anchor="middle" font-weight="bold">${m.nom}</text>`;
  spines.forEach(([s,c],i)=>{
    const top=i<3,xBase=100+i%3*130,yEnd=H/2,yStart=top?40:H-40;
    svg+=`<line x1="${xBase}" y1="${yStart}" x2="${xBase+40}" y2="${yEnd}" stroke="${c}" stroke-width="2"/>`;
    svg+=`<text x="${xBase-4}" y="${top?yStart-6:yStart+14}" font-size="10" fill="${c}" text-anchor="middle" font-weight="bold">${s}</text>`;
    (cats[s]||[]).forEach((e,j)=>{svg+=`<text x="${xBase+j*18}" y="${top?yStart+18+j*16:yStart-18-j*16}" font-size="8" fill="#374151">${e}</text>`;});
  });
  svg+=`<text x="${W/2}" y="${H-6}" font-size="11" fill="#374151" text-anchor="middle" font-weight="bold">Diagramme d'Ishikawa</text></svg>`;
  document.getElementById('ishi-chart').innerHTML=svg;
}

// MODALS
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

// CLIENT MODAL
function openNewClient(){
  editClientId=null;
  document.getElementById('client-modal-title').textContent="Nouveau client";
  ['c-nom','c-contact','c-tel','c-email'].forEach(id=>document.getElementById(id).value='');
  openModal('modal-client');
}
function openEditClient(id){
  editClientId=id;
  const c=getClient(id);
  document.getElementById('client-modal-title').textContent="Modifier le client";
  document.getElementById('c-nom').value=c.nom||'';
  document.getElementById('c-contact').value=c.contact||'';
  document.getElementById('c-tel').value=c.tel||'';
  document.getElementById('c-email').value=c.email||'';
  openModal('modal-client');
}
function saveClient(){
  const nom=document.getElementById('c-nom').value.trim();
  if(!nom) return alert("Le nom est obligatoire.");
  const data={nom,contact:document.getElementById('c-contact').value,tel:document.getElementById('c-tel').value,email:document.getElementById('c-email').value};
  if(editClientId){clients=clients.map(c=>c.id===editClientId?{...data,id:c.id}:c);}
  else{clients.push({...data,id:Date.now()});}
  closeModal('modal-client');
  renderClients();
  renderDashboard();
}
function delClient(id){
  if(!confirm("Supprimer ce client ?")) return;
  clients=clients.filter(c=>c.id!==id);
  renderClients(); renderDashboard();
}

// MACHINE MODAL
function buildMachineModal(){
  const sel=document.getElementById('m-type');
  sel.innerHTML=MACHINE_TYPES.map(t=>`<option>${t}</option>`).join('');
  const csel=document.getElementById('m-client');
  csel.innerHTML=`<option value="">-- Aucun --</option>`+clients.map(c=>`<option value="${c.id}">${c.nom}</option>`).join('');
}
function openNewMachine(){
  editMachineId=null;
  buildMachineModal();
  document.getElementById('machine-modal-title').textContent="Nouvelle machine";
  ['m-nom','m-marque','m-serie'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('m-annee').value=new Date().getFullYear();
  document.getElementById('m-type').selectedIndex=0;
  document.getElementById('m-client').value='';
  openModal('modal-machine');
}
function openEditMachine(id){
  editMachineId=id;
  const m=getMachine(id);
  buildMachineModal();
  document.getElementById('machine-modal-title').textContent="Modifier la machine";
  document.getElementById('m-nom').value=m.nom||'';
  document.getElementById('m-marque').value=m.marque||'';
  document.getElementById('m-serie').value=m.serie||'';
  document.getElementById('m-annee').value=m.annee||'';
  document.getElementById('m-type').value=m.type||MACHINE_TYPES[0];
  document.getElementById('m-client').value=m.clientId||'';
  openModal('modal-machine');
}
function saveMachine(){
  const nom=document.getElementById('m-nom').value.trim();
  if(!nom) return alert("Le nom est obligatoire.");
  const data={nom,type:document.getElementById('m-type').value,marque:document.getElementById('m-marque').value,serie:document.getElementById('m-serie').value,annee:Number(document.getElementById('m-annee').value),clientId:Number(document.getElementById('m-client').value)||''};
  if(editMachineId){machines=machines.map(m=>m.id===editMachineId?{...data,id:m.id}:m);}
  else{machines.push({...data,id:Date.now()});}
  closeModal('modal-machine');
  renderMachines(); renderDashboard();
}
function delMachine(id){
  if(!confirm("Supprimer cette machine ?")) return;
  machines=machines.filter(m=>m.id!==id);
  renderMachines(); renderDashboard();
}

// INTERV MODAL
function buildIntervModal(){
  const sel=document.getElementById('i-machine');
  sel.innerHTML=`<option value="">-- Sélectionner --</option>`+machines.map(m=>`<option value="${m.id}">${m.nom}</option>`).join('');
}
function openNewInterv(){
  editIntervId=null;
  buildIntervModal();
  document.getElementById('interv-modal-title').textContent="Nouvelle intervention";
  ['i-desc','i-tech','i-duree','i-cout','i-panne'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('i-date').value='';
  document.getElementById('i-machine').value='';
  document.getElementById('i-type').selectedIndex=0;
  openModal('modal-interv');
}
function openEditInterv(id){
  editIntervId=id;
  const i=interventions.find(x=>x.id===id);
  buildIntervModal();
  document.getElementById('interv-modal-title').textContent="Modifier l'intervention";
  document.getElementById('i-machine').value=i.machineId;
  document.getElementById('i-date').value=i.date;
  document.getElementById('i-type').value=i.type;
  document.getElementById('i-desc').value=i.description;
  document.getElementById('i-tech').value=i.technicien;
  document.getElementById('i-duree').value=i.duree;
  document.getElementById('i-cout').value=i.cout;
  document.getElementById('i-panne').value=i.panne;
  openModal('modal-interv');
}
function saveInterv(){
  const mId=document.getElementById('i-machine').value;
  const date=document.getElementById('i-date').value;
  if(!mId||!date) return alert("Machine et date obligatoires.");
  const data={machineId:Number(mId),date,type:document.getElementById('i-type').value,description:document.getElementById('i-desc').value,technicien:document.getElementById('i-tech').value,duree:Number(document.getElementById('i-duree').value)||0,cout:Number(document.getElementById('i-cout').value)||0,panne:document.getElementById('i-panne').value};
  if(editIntervId){interventions=interventions.map(i=>i.id===editIntervId?{...data,id:i.id}:i);}
  else{interventions.push({...data,id:Date.now()});}
  closeModal('modal-interv');
  renderInterventions(); renderDashboard();
}
function delInterv(id){
  if(!confirm("Supprimer cette intervention ?")) return;
  interventions=interventions.filter(i=>i.id!==id);
  renderInterventions(); renderDashboard();
}

// INIT
renderDashboard();
